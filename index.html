<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>QR Dinámico</title>
  <style>
      body {
        background-color: lightblue;
        text-align: center;
        font-family: sans-serif;
      }

      #fallback {
        display: none;
        margin-top: 24px;
      }

      #fallback button {
        color: #00478a;
        font-weight: bold;
      }

      .lds-ring {
  display: inline-block;
  position: relative;
  width: 80px;
  height: 80px;
}
.lds-ring div {
  box-sizing: border-box;
  display: block;
  position: absolute;
  width: 64px;
  height: 64px;
  margin: 8px;
  border: 8px solid #fff;
  border-radius: 50%;
  animation: lds-ring 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
  border-color: #fff transparent transparent transparent;
}
.lds-ring div:nth-child(1) {
  animation-delay: -0.45s;
}
.lds-ring div:nth-child(2) {
  animation-delay: -0.3s;
}
.lds-ring div:nth-child(3) {
  animation-delay: -0.15s;
}
@keyframes lds-ring {
  0% {
    transform: rotate(0deg);
  }
  100% {
    transform: rotate(360deg);
  }
}

  </style>
</head>
<body>
  <script>
    const AS_URL_BASE = "https://script.google.com/macros/s/AKfycbw5PnDQ94auILxGnAFaY2kZk3b9bUAaMS7BzxEncoBZQyQyxh0xOLlRyHMxTSF3hEMc/exec";
    const ALLOWED_PROTOCOLS = ["http:", "https:", "mailto:", "tel:"];

    function showFallback(message) {
      document.getElementById("lds-ring").style.display = "none";
      var fallback = document.getElementById("fallback");
      fallback.querySelector("p").textContent = message;
      fallback.style.display = "block";
    }

    function isSafeDestination(destino) {
      try {
        var target = new URL(destino);
        return ALLOWED_PROTOCOLS.includes(target.protocol);
      } catch (err) {
        return false;
      }
    }

    var k = new URLSearchParams(document.location.search).get("k");

    if (k) {
      fetch(AS_URL_BASE + "?k=" + encodeURIComponent(k))
        .then(function (r) { return r.text(); })
        .then(function (destino) {
          if (destino && isSafeDestination(destino)) {
            document.location.replace(destino);
          } else {
            showFallback("No se pudo determinar un destino válido para este código.");
          }
        })
        .catch(function (err) {
          console.log(err);
          showFallback("No se pudo contactar el servicio de redirección. Verifica tu conexión e inténtalo de nuevo.");
        });
    } else {
      showFallback("Este enlace no incluye un código válido.");
    }
  </script>

  <div id="lds-ring" class="lds-ring"><div></div><div></div><div></div><div></div></div>

  <div id="fallback">
    <p></p>
    <button onclick="location.reload()">Reintentar</button>
  </div>

</body>
</html>
